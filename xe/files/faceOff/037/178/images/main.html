.preload1 {background:#fff;}

.menu1 {padding:10px 0px 0px 0px; margin:0px; list-style:none; height:36px; background:#fff; position:relative; z-index:550; font-family:돋움, dotum, arial, verdana, sans-serif;}
.menu1 li.top {display:block; float:left;}
.menu1 li a.top_link {display:block; float:left; height:36px; line-height:36px; color:#414141; text-decoration:none; font-size:12px; font-weight:bold; padding:0px 0px 0px 0px; cursor:pointer; background: #fff; }
.menu1 li a.top_link span {float:left; display:block; padding:0px 15px 0px 0px; height:36px; background:#fff;}
.menu1 li a.top_link span.down {float:left; display:block; padding:0px 15px 0px 0px; height:36px; background: #fff;}
.menu1 li a.top_link:hover {color:#FF0000; background:#fff;}
.menu1 li a.top_link:hover span {background:#fff;}
.menu1 li a.top_link:hover span.down {background:#fff;}

.menu1 li:hover > a.top_link {color:#FF0000; background:#fff;}
.menu1 li:hover > a.top_link span {background:#fff;}
.menu1 li:hover > a.top_link span.down {background:#fff;}


.menu1 table {border-collapse:collapse; width:0; height:0; position:absolute; top:0; left:0;}

/* Default link styling */

/* Style the list OR link hover. Depends on which browser is used */

.menu1 a:hover {visibility:visible; position:relative; z-index:200;}
.menu1 li:hover {position:relative; z-index:200;}

/* keep the 'next' level invisible by placing it off screen. */
.menu1 ul, 
.menu1 :hover ul ul, 
.menu1 :hover ul :hover ul ul,
.menu1 :hover ul :hover ul :hover ul ul,
.menu1 :hover ul :hover ul :hover ul :hover ul ul {position:absolute; left:-9999px; top:-9999px; width:0; height:0; margin:0; padding:0; list-style:none;}

.menu1 :hover ul.sub {left:0; top:35px; background: #fff; padding:1px; border:1px solid #000000; white-space:nowrap; width:114px; height:auto; z-index:300;}
.menu1 :hover ul.sub li {display:block; height:20px; position:relative; float:left; width:114px; font-weight:normal;}
.menu1 :hover ul.sub li a {display:block; font-size:11px; height:20px; width:114px; line-height:20px; text-indent:5px; color:#000; text-decoration:none;}
.menu1 :hover ul.sub li a.fly {background:#fff 80px 7px no-repeat;}
.menu1 :hover ul.sub li a:hover {background:#000000; color:#fff;}
.menu1 :hover ul.sub li a.fly:hover {background:#000000 80px 7px no-repeat; color:#fff;}
.menu1 :hover ul li:hover > a.fly {background:#000000 80px 7px no-repeat; color:#fff;} 

.menu1 :hover ul :hover ul,
.menu1 :hover ul :hover ul :hover ul,
.menu1 :hover ul :hover ul :hover ul :hover ul,
.menu1 :hover ul :hover ul :hover ul :hover ul :hover ul
{left:114px; top:-4px; background: #fff; padding:1px; border:1px solid #F06EAA; white-space:nowrap; width:114px; z-index:400; height:auto;}
