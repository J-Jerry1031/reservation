<block cond="Context::get('act') == 'dispBoardWrite' && Context::get('logged_info') && !$document_srl && !$_COOKIE['window-agree']">
<load target="./css/xeicon.css"/>
<load target="./css/style.css"/>
<load target="./js/jquery.cookie.js"/>
<load target="./js/window.js"/>
<div id="showindow">
	<div class="show-group">
		<div class="show-middle">
			<div class="show-content">
				<div class="show-main">
					<div class="show-title">{$addon_info->title} <i class="xi-announce"></i></div>
					<div class="show-line"></div>
					<div class="show-desc">{$addon_info->content}</div>
				</div>
				<div class="show-footer">
					<span class="kyouwa-mou"><label for="kyouwa"><input type="checkbox" id="kyouwa"/> 오늘하루 그만보기</label></span>
					<span class="show-close"><i class="xi-close-square"></i> 닫기</span>
				</div>
			</div>
		</div>
	</div>
</div>
</block>
