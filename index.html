        const table = query.get("bo_table");

        };
        const page = path.includes("/bbs/board.php") && pages[table] ? pages[table] : null;
        const noindex = /\/adm|\/bbs\/(login|register|member|write)\.php/.test(path);
        if (!page && !noindex) return;
        const canonical = page
          ? `https://xn--she-vg3mw53b.com/bbs/board.php?bo_table=${encodeURIComponent(table)}`
          : `https://xn--she-vg3mw53b.com${path}`;
        if (page) document.title = page[0];
        const setContent = (selector, value) => {
          const node = document.querySelector(selector);
          if (node) node.setAttribute("content", value);
        };
        if (page) {
          setContent('meta[name="description"]', page[1]);
          setContent('meta[property="og:title"]', page[0]);
          setContent('meta[property="og:description"]', page[1]);
          setContent('meta[property="og:url"]', canonical);
          setContent('meta[name="twitter:title"]', page[0]);
          setContent('meta[name="twitter:description"]', page[1]);
        }
        if (noindex) setContent('meta[name="robots"]', "noindex,nofollow");
        const canonicalNode = document.querySelector('link[rel="canonical"]');
        if (canonicalNode) canonicalNode.setAttribute("href", canonical);
      })();
    </script>
